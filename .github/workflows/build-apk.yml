name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Make Gradle executable ──────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 7. Build release APK ───────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── 8. Sign APK (debug keystore — safe for testing) ───────────────────
      - name: Sign APK with debug keystore
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out android/app/build/outputs/apk/release/PredictorApp-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk || \
          cp android/app/build/outputs/apk/release/app-release*.apk \
             android/app/build/outputs/apk/release/PredictorApp-signed.apk

      # ── 9. Upload APK as artifact ──────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PredictorApp-APK
          path: android/app/build/outputs/apk/release/PredictorApp-signed.apk
          retention-days: 30

      # ── 10. Create GitHub Release on push to main ─────────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PredictorApp v${{ github.run_number }}"
          body: |
            ## Hybrid AI Sequence Predictor
            Auto-built APK from commit ${{ github.sha }}
            ### What's inside
            - Full Hybrid AI Prediction System (9 engines)
            - Weekly pair dashboard with charts
            - CSV/Excel data import
            - Day-by-day ?? cell guesser
          files: android/app/build/outputs/apk/release/PredictorApp-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


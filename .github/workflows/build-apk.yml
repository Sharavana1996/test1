name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 5. Get correct gradle-wrapper.jar ─────────────────────────────────
      - name: Set up Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          # Use gradle's own wrapper task to generate the jar
          cd /tmp
          mkdir gradle-init && cd gradle-init
          cat > build.gradle << 'GRADLE'
          wrapper {
            gradleVersion = '8.6'
          }
          GRADLE
          gradle wrapper --gradle-version 8.6
          cp gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/android/gradle/wrapper/
          echo "=== Jar info ==="
          ls -la $GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar
          jar tf $GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar | grep -i "IDownload\|GradleWrapperMain" || echo "classes not found in jar listing"

      # ── 6. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 7. Make Gradle executable ──────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 8. Build release APK ───────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Sign APK ────────────────────────────────────────────────────────
      - name: Sign APK with debug keystore
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out android/app/build/outputs/apk/release/PredictorApp-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk || \
          cp android/app/build/outputs/apk/release/app-release*.apk \
             android/app/build/outputs/apk/release/PredictorApp-signed.apk

      # ── 10. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PredictorApp-APK
          path: android/app/build/outputs/apk/release/PredictorApp-signed.apk
          retention-days: 30

      # ── 11. Create GitHub Release ──────────────────────────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PredictorApp v${{ github.run_number }}"
          body: |
            ## Hybrid AI Sequence Predictor
            Auto-built APK from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/release/PredictorApp-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
